<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Microphone icon -->
  <g transform="translate(256, 220)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mic body -->
    <rect x="-36" y="-80" width="72" height="120" rx="36" fill="white" opacity="0.95"/>
    <!-- Mic arc -->
    <path d="M-70 20 Q-70 80 0 80 Q70 80 70 20" />
    <!-- Mic stand -->
    <line x1="0" y1="80" x2="0" y2="120"/>
    <line x1="-30" y1="120" x2="30" y2="120"/>
  </g>
  <!-- Sound waves -->
  <g transform="translate(256, 220)" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.7">
    <path d="M90 -20 Q110 0 90 20"/>
    <path d="M110 -40 Q140 0 110 40"/>
  </g>
  <!-- Text "8" -->
  <text x="256" y="400" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="100" font-weight="700" opacity="0.95">8</text>
</svg>
